<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Login - NextLevel</title>
    <link rel="stylesheet" href="login-style.css" />
  </head>
  <body>
    <div class="login-container">
      <h2>Acesse sua Conta</h2>

      <form id="login-form">
        <div class="input-group">
          <label for="login-input">E-mail Cadastrado</label>
          <input
            type="email"
            id="login-input"
            placeholder="exemplo@email.com"
            required
          />
        </div>

        <button type="submit">Entrar no Sistema</button>
      </form>

      <div class="footer-link">
        Não tem uma conta? <a href="index.html">Cadastre-se aqui</a>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
